name: Coverage

on:
  push:
    branches: [main]
  # PR에서는 실행 안 함 — 커버리지는 main 병합 후 추적용


env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    name: cargo-tarpaulin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: |
          cargo tarpaulin \
            --all-features \
            --workspace \
            --timeout 120 \
            --out Xml \
            --output-dir coverage

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Report coverage
        run: |
          COVERAGE=$(grep -oP 'line-rate="\K[^"]+' coverage/cobertura.xml | head -1)
          PERCENT=$(echo "$COVERAGE * 100" | bc -l | xargs printf "%.0f")
          echo "Coverage: ${PERCENT}%"
          # 임계값 강제: Phase 4(v1.0) 완성 후 아래 주석 해제
          # THRESHOLD=70
          # if [ "$PERCENT" -lt "$THRESHOLD" ]; then
          #   echo "Coverage ${PERCENT}% is below ${THRESHOLD}% threshold"
          #   exit 1
          # fi
          echo "Target: 70% (enforced at v1.0)"
