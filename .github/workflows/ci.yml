name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────
  # 🦀 Rust CLI
  # ──────────────────────────────────────────
  rust-fmt:
    name: Rust fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: Rust clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  rust-test:
    name: Rust test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-features --workspace

  # ──────────────────────────────────────────
  # ⚙ FastAPI 백엔드 (api/ 존재할 때만)
  # ──────────────────────────────────────────
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: worklog_test
          POSTGRES_USER: worklog
          POSTGRES_PASSWORD: worklog
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Check api/ exists
        id: check_api
        run: |
          if [ -f "api/requirements.txt" ] || [ -f "api/pyproject.toml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-python@v5
        if: steps.check_api.outputs.exists == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        if: steps.check_api.outputs.exists == 'true'
        run: pip install -r requirements.txt aiosqlite anyio
        working-directory: api
      - name: Run pytest
        if: steps.check_api.outputs.exists == 'true'
        run: pytest --tb=short -q
        working-directory: api
        env:
          DATABASE_URL: postgresql+asyncpg://worklog:worklog@localhost:5432/worklog_test
          JWT_SECRET: test-secret
          JWT_EXPIRE_HOURS: 24

  # ──────────────────────────────────────────
  # 🌐 Next.js 프론트엔드 (web/ 존재할 때만)
  # ──────────────────────────────────────────
  next-build:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check web/ exists
        id: check_web
        run: |
          if [ -f "web/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - uses: pnpm/action-setup@v4
        if: steps.check_web.outputs.exists == 'true'
        with:
          version: latest
      - uses: actions/setup-node@v4
        if: steps.check_web.outputs.exists == 'true'
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install dependencies
        if: steps.check_web.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Type check
        if: steps.check_web.outputs.exists == 'true'
        run: pnpm tsc --noEmit
        working-directory: web
      - name: Build
        if: steps.check_web.outputs.exists == 'true'
        run: pnpm build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: https://api.worklog.dev

  # ──────────────────────────────────────────
  # 최종 상태 게이트 (PR 머지 가드)
  # ──────────────────────────────────────────
  ci-pass:
    name: CI Pass
    runs-on: ubuntu-latest
    needs: [rust-fmt, rust-clippy, rust-test]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.rust-fmt.result }}" != "success" ||
                "${{ needs.rust-clippy.result }}" != "success" ||
                "${{ needs.rust-test.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"
