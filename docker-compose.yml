services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: worklog
      POSTGRES_USER: worklog
      POSTGRES_PASSWORD: worklog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worklog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://worklog:worklog@postgres:5432/worklog
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE_HOURS: 24
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app

volumes:
  pgdata:
